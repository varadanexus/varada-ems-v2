<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#07111f" />
  <title>Varada Nexus — Offline</title>
  <style>
    :root { color-scheme: dark; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; padding: 24px; color: #eef3f8; background: radial-gradient(circle at top, #17263b 0, #07111f 48%, #030810 100%); }
    main { width: min(440px, 100%); padding: 40px; text-align: center; border: 1px solid rgba(211, 178, 104, .32); border-radius: 24px; background: rgba(8, 18, 31, .88); box-shadow: 0 28px 80px rgba(0, 0, 0, .42); }
    img { width: 112px; height: 112px; object-fit: contain; margin-bottom: 20px; }
    h1 { margin: 0 0 12px; font-size: clamp(1.7rem, 5vw, 2.2rem); }
    p { margin: 0 0 28px; color: #aebccc; line-height: 1.6; }
    button { border: 1px solid #d3b268; border-radius: 999px; padding: 12px 24px; color: #07111f; background: #d3b268; font: inherit; font-weight: 750; cursor: pointer; }
  </style>
</head>
<body>
  <main>
    <img src="/new-ems/assets/icons/ems-192.png" alt="Varada Nexus" />
    <h1>You’re offline</h1>
    <p>Varada Nexus needs a secure internet connection to load company data. Reconnect and try again.</p>
    <button type="button" onclick="window.location.reload()">Try again</button>
  </main>
</body>
</html>
