<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" font-family="-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="lsky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0c1d3a"/><stop offset=".65" stop-color="#0a1730"/><stop offset="1" stop-color="#07101f"/>
    </linearGradient>
    <linearGradient id="lgold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e8d3ae"/><stop offset="1" stop-color="#b98d55"/>
    </linearGradient>
    <linearGradient id="lblue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2997ff"/><stop offset="1" stop-color="#7b5cff"/>
    </linearGradient>
    <radialGradient id="lglow" cx=".3" cy=".15" r=".9">
      <stop offset="0" stop-color="#2997ff" stop-opacity=".22"/><stop offset="1" stop-color="#2997ff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#lsky)"/>
  <rect width="1600" height="900" fill="url(#lglow)"/>
  <!-- gantry crane -->
  <g stroke="#41618f" stroke-width="8" fill="none">
    <line x1="200" y1="740" x2="200" y2="220"/>
    <line x1="620" y1="740" x2="620" y2="220"/>
    <line x1="120" y1="220" x2="980" y2="220"/>
    <line x1="200" y1="300" x2="620" y2="300"/>
  </g>
  <line x1="840" y1="220" x2="840" y2="380" stroke="#41618f" stroke-width="4"/>
  <!-- hanging container -->
  <rect x="770" y="380" width="140" height="70" rx="6" fill="url(#lgold)"/>
  <g stroke="#0d1a33" stroke-width="3" opacity=".5">
    <line x1="795" y1="384" x2="795" y2="446"/><line x1="820" y1="384" x2="820" y2="446"/><line x1="845" y1="384" x2="845" y2="446"/><line x1="870" y1="384" x2="870" y2="446"/><line x1="890" y1="384" x2="890" y2="446"/>
  </g>
  <!-- container stacks -->
  <g stroke="#2c4470" stroke-width="2">
    <rect x="250" y="620" width="180" height="60" rx="5" fill="#16294a"/>
    <rect x="250" y="552" width="180" height="60" rx="5" fill="#1d3660"/>
    <rect x="250" y="484" width="180" height="60" rx="5" fill="#16294a"/>
    <rect x="450" y="620" width="180" height="60" rx="5" fill="#1d3660"/>
    <rect x="450" y="552" width="180" height="60" rx="5" fill="url(#lblue)" opacity=".85"/>
    <rect x="1050" y="620" width="180" height="60" rx="5" fill="#16294a"/>
    <rect x="1050" y="552" width="180" height="60" rx="5" fill="#1d3660"/>
    <rect x="1250" y="620" width="180" height="60" rx="5" fill="#1d3660"/>
  </g>
  <!-- truck -->
  <g>
    <rect x="700" y="560" width="300" height="110" rx="8" fill="#101f3c" stroke="#2c4470" stroke-width="2"/>
    <rect x="700" y="560" width="300" height="110" rx="8" fill="none" stroke="#2c4470" stroke-width="2"/>
    <text x="850" y="628" text-anchor="middle" fill="#adc0e7" font-size="24" letter-spacing="5">VARADA</text>
    <path d="M1000 600h70l40 44v36h-110z" fill="#16294a" stroke="#2c4470" stroke-width="2"/>
    <rect x="1014" y="612" width="34" height="24" rx="3" fill="#2997ff" opacity=".8"/>
    <circle cx="760" cy="688" r="24" fill="#0a1428" stroke="#41618f" stroke-width="5"/>
    <circle cx="930" cy="688" r="24" fill="#0a1428" stroke="#41618f" stroke-width="5"/>
    <circle cx="1064" cy="688" r="24" fill="#0a1428" stroke="#41618f" stroke-width="5"/>
  </g>
  <!-- route line -->
  <g fill="none">
    <path d="M120 180 C 400 80, 900 120, 1480 150" stroke="url(#lblue)" stroke-width="2.5" stroke-dasharray="10 9" opacity=".8"/>
    <circle cx="120" cy="180" r="7" fill="#2997ff"/>
    <circle cx="800" cy="112" r="7" fill="#7b5cff"/>
    <circle cx="1480" cy="150" r="9" fill="none" stroke="#d9b98a" stroke-width="3"/>
    <circle cx="1480" cy="150" r="3.5" fill="#d9b98a"/>
  </g>
  <!-- ground -->
  <rect x="0" y="740" width="1600" height="160" fill="#050c18"/>
  <line x1="0" y1="740" x2="1600" y2="740" stroke="#2c4470"/>
  <g text-anchor="middle">
    <text x="800" y="820" fill="#adc0e7" font-size="26" letter-spacing="8" opacity=".85">MINING &#38; LOGISTICS</text>
    <text x="800" y="856" fill="#7e90b5" font-size="14" letter-spacing="4">EXTRACTION &#183; FLEET &#183; SUPPLY CHAIN</text>
  </g>
</svg>
