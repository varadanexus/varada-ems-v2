name: Publish signed Varada EMS Android release

on:
  push:
    tags:
      - "android-v*"

permissions:
  contents: write

jobs:
  signed-release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK 36
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Validate signing secrets
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          test -n "$KEYSTORE_BASE64"
          test -n "$KEYSTORE_PASSWORD"
          test -n "$KEY_ALIAS"
          test -n "$KEY_PASSWORD"

      - name: Restore release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: printf '%s' "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/varada-ems-release.p12"

      - name: Install dependencies
        run: npm ci

      - name: Validate and sync native project
        run: |
          npm run check:pwa
          npm run check:migrations
          npm run check:android
          npm run android:sync

      - name: Resolve Android version
        run: echo "ANDROID_VERSION_NAME=${GITHUB_REF_NAME#android-v}" >> "$GITHUB_ENV"

      - name: Build signed release APK
        working-directory: android
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/varada-ems-release.p12
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_VERSION_NAME: ${{ env.ANDROID_VERSION_NAME }}
          ANDROID_VERSION_CODE: ${{ github.run_number }}
        run: ./gradlew assembleRelease --no-daemon

      - name: Verify APK signature
        run: |
          "$ANDROID_HOME/build-tools/36.0.0/apksigner" verify --verbose --print-certs android/app/build/outputs/apk/release/app-release.apk

      - name: Prepare public APK
        run: cp android/app/build/outputs/apk/release/app-release.apk Varada-EMS.apk

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: Varada-EMS-signed-${{ github.ref_name }}
          path: Varada-EMS.apk
          if-no-files-found: error
          retention-days: 90

      - name: Publish permanent GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: Varada EMS Android ${{ github.ref_name }}
          body: |
            Signed Varada EMS Android release.

            Download `Varada-EMS.apk` on an Android device and install it. This release supports secure in-app downloads for future mandatory updates. Android will still show its required installation confirmation.
          files: Varada-EMS.apk
          make_latest: true
