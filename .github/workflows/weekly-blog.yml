name: Weekly AI blog post

on:
  # Weekly schedule retired — superseded by daily-blog.yml (news-driven daily posts).
  # schedule:
  #   - cron: "0 4 * * 1"
  workflow_dispatch: {}    # still runnable manually from the Actions tab

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Generate and publish a post
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          AI_PROVIDER: ${{ vars.AI_PROVIDER }}          # "gemini" (free), "anthropic", or "openai"
          AI_MODEL: ${{ vars.AI_MODEL }}                # optional override
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: node scripts/generate-blog-post.mjs
