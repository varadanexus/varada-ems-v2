name: Deploy Beta EMS To GitHub Pages

on:
  push:
    branches:
      - release/2.0-rc1
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare Pages bundle
        shell: bash
        run: |
          rm -rf .pages-dist
          mkdir -p .pages-dist
          # Public website pages live at the repo root (clean URLs: /founder, /services, ...)
          cp ./*.html .pages-dist/
          cp robots.txt .pages-dist/robots.txt
          cp sitemap.xml .pages-dist/sitemap.xml
          cp -R assets .pages-dist/assets
          cp -R images .pages-dist/images
          cp -R portals .pages-dist/portals
          cp -R blog .pages-dist/blog
          cp favicon.ico .pages-dist/favicon.ico
          cp -R new-ems/. .pages-dist/new-ems/
          cp CNAME .pages-dist/CNAME

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload EMS beta artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./.pages-dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
