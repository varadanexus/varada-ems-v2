<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Blog Console — Varada Nexus</title>
<link rel="icon" type="image/png" href="/images/logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&display=swap">
<link rel="stylesheet" href="/assets/site.css">
<style>
  .console-wrap{max-width:1080px;margin:0 auto;padding:calc(var(--nav-h) + 40px) 22px 60px}
  .console-head{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:14px;margin-bottom:26px}
  .console-head h1{font-family:var(--font-serif);font-size:28px}
  .console-grid{display:grid;grid-template-columns:1fr 1.1fr;gap:22px}
  @media (max-width:840px){.console-grid{grid-template-columns:1fr}}
  .adm-list{display:flex;flex-direction:column;gap:12px;max-height:70vh;overflow:auto;padding-right:4px}
  .adm-item{border:1px solid var(--border-soft);border-radius:14px;padding:14px 16px;background:var(--surface)}
  .adm-item h4{font-size:15px;margin-bottom:4px}
  .adm-item .meta{font-size:12px;color:var(--text-3);letter-spacing:.04em}
  .adm-item .row{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
  .pill{font-size:11px;padding:3px 9px;border-radius:99px;letter-spacing:.05em;text-transform:uppercase;font-weight:600}
  .pill.published{background:rgba(47,208,122,.16);color:#57e39b}
  .pill.draft{background:var(--surface-2);color:var(--text-2)}
  .pill.archived{background:rgba(255,122,122,.14);color:#ff9d9d}
  .pill.ai{background:var(--gold-soft);color:var(--gold)}
  .btn-sm{font-size:12.5px;padding:7px 13px;border-radius:9px;border:1px solid var(--border);background:var(--surface-2);color:var(--text);cursor:pointer}
  .btn-sm:hover{border-color:var(--border-gold)}
  .btn-sm.danger:hover{border-color:#ff7a7a;color:#ff9d9d}
  .adm-msg{font-size:13.5px;margin-top:10px;min-height:18px}
  .adm-msg.ok{color:#57e39b}.adm-msg.err{color:#ff7a7a}
  .field textarea.code{font-family:var(--font-mono,monospace);min-height:220px;font-size:13.5px;line-height:1.5}
  #gate{max-width:420px;margin:0 auto}
</style>
</head>
<body>
<div class="ambient"></div>

<main class="console-wrap">
  <div class="console-head">
    <h1>Blog <span class="gold-text">Console</span></h1>
    <div>
      <a class="btn-sm" href="/blog/" style="text-decoration:none">View blog</a>
      <button class="btn-sm" id="logoutBtn" style="display:none">Log out</button>
    </div>
  </div>

  <!-- GATE -->
  <div id="gate" class="form-panel" style="display:none">
    <h3 style="text-align:center;margin-bottom:6px">Administrator sign in</h3>
    <p class="form-note" style="margin:0 0 18px">Sign in with your Varada Nexus administrator account to manage the blog.</p>
    <div class="field"><label>Email</label><input type="email" id="email" autocomplete="username" placeholder="name@varadanexus.com"></div>
    <div class="field"><label>Password</label><input type="password" id="password" autocomplete="current-password" placeholder="••••••••"></div>
    <button class="btn btn-primary" id="loginBtn">Sign in</button>
    <p class="adm-msg err" id="gateMsg"></p>
    <p class="form-note">Already signed in to the EMS in this browser? <a href="#" id="useSession" style="color:var(--accent)">Use that session</a>.</p>
  </div>

  <!-- CONSOLE -->
  <div id="console" style="display:none">
    <div class="console-grid">
      <div class="form-panel">
        <h3 id="editorTitle" style="margin-bottom:16px">New post</h3>
        <input type="hidden" id="postId">
        <div class="field"><label>Title</label><input type="text" id="f_title" placeholder="Post title"></div>
        <div class="field"><label>Slug (URL)</label><input type="text" id="f_slug" placeholder="auto-generated-from-title"></div>
        <div class="field"><label>Excerpt</label><textarea id="f_excerpt" rows="2" placeholder="One-line summary shown on the blog list"></textarea></div>
        <div class="field"><label>Cover image URL (optional)</label><input type="text" id="f_cover" placeholder="/images/... or https://..."></div>
        <div class="field"><label>Tags (comma-separated)</label><input type="text" id="f_tags" placeholder="Healthcare, Logistics"></div>
        <div class="field"><label>Content (HTML)</label><textarea id="f_content" class="code" placeholder="&lt;p&gt;Your article...&lt;/p&gt;"></textarea></div>
        <div class="field"><label>Status</label>
          <select id="f_status"><option value="draft">Draft</option><option value="published">Published</option><option value="archived">Archived</option></select>
        </div>
        <div class="row" style="display:flex;gap:10px">
          <button class="btn btn-primary" id="saveBtn" style="flex:1">Save post</button>
          <button class="btn btn-ghost" id="newBtn" type="button">Clear</button>
        </div>
        <p class="adm-msg" id="editMsg"></p>
      </div>

      <div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
          <h3>All posts</h3><button class="btn-sm" id="refreshBtn">Refresh</button>
        </div>
        <div class="adm-list" id="list"><p class="blog-status">Loading…</p></div>
      </div>
    </div>
  </div>
</main>

<script src="/new-ems/config/runtime.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function () {
  var cfg = window.EMS_RUNTIME_CONFIG || {};
  var gate = document.getElementById("gate");
  var cons = document.getElementById("console");
  var logoutBtn = document.getElementById("logoutBtn");
  if (!window.supabase || !cfg.supabaseUrl || !cfg.supabaseAnonKey) {
    document.querySelector(".console-wrap").innerHTML = '<p class="blog-status">Console unavailable — configuration missing.</p>';
    return;
  }
  var sb = window.supabase.createClient(cfg.supabaseUrl, cfg.supabaseAnonKey);

  var $ = function (id) { return document.getElementById(id); };
  function slugify(s){ return (s||"").toLowerCase().trim().replace(/[^a-z0-9\s-]/g,"").replace(/[\s_-]+/g,"-").replace(/^-+|-+$/g,""); }
  function msg(el, text, ok){ el.textContent = text; el.className = "adm-msg " + (ok ? "ok" : "err"); }

  function showGate(m){ gate.style.display="block"; cons.style.display="none"; logoutBtn.style.display="none"; if(m) $("gateMsg").textContent=m; }
  function showConsole(){ gate.style.display="none"; cons.style.display="block"; logoutBtn.style.display="inline-block"; loadPosts(); }

  async function boot(){
    var s = await sb.auth.getSession();
    if (!s.data.session) { showGate(""); return; }
    // verify admin (best effort; RLS is the real guard)
    try {
      var r = await sb.rpc("is_super_admin");
      if (r.error) { showConsole(); return; }        // rpc not exposed → rely on RLS
      if (r.data === true) { showConsole(); }
      else { showGate("This account is not an administrator."); await sb.auth.signOut(); }
    } catch (e) { showConsole(); }
  }

  $("loginBtn").addEventListener("click", async function () {
    var email=$("email").value.trim(), password=$("password").value;
    $("gateMsg").textContent="";
    var r = await sb.auth.signInWithPassword({ email: email, password: password });
    if (r.error) { $("gateMsg").textContent = r.error.message; return; }
    boot();
  });
  $("useSession").addEventListener("click", function(e){ e.preventDefault(); boot(); });
  logoutBtn.addEventListener("click", async function(){ await sb.auth.signOut(); showGate("Signed out."); });

  function postRow(p){
    var el = document.createElement("div"); el.className="adm-item";
    el.innerHTML =
      '<h4>'+ (p.title||"(untitled)") +'</h4>'
      + '<div class="meta">/blog/'+ (p.slug||"") +' · '+ new Date(p.created_at).toLocaleDateString() +'</div>'
      + '<div class="row">'
        + '<span class="pill '+p.status+'">'+p.status+'</span>'
        + (p.source==="ai" ? '<span class="pill ai">AI</span>' : '')
        + '<button class="btn-sm" data-act="edit">Edit</button>'
        + '<button class="btn-sm" data-act="toggle">'+(p.status==="published"?"Unpublish":"Publish")+'</button>'
        + '<button class="btn-sm danger" data-act="del">Delete</button>'
      + '</div>';
    el.querySelector('[data-act="edit"]').onclick=function(){ fillForm(p); window.scrollTo({top:0,behavior:"smooth"}); };
    el.querySelector('[data-act="toggle"]').onclick=function(){ togglePublish(p); };
    el.querySelector('[data-act="del"]').onclick=function(){ if(confirm('Delete "'+(p.title||"")+'"? This cannot be undone.')) delPost(p.id); };
    return el;
  }

  async function loadPosts(){
    var list=$("list"); list.innerHTML='<p class="blog-status">Loading…</p>';
    var r = await sb.from("blog_posts").select("*").order("created_at",{ascending:false});
    if (r.error){ list.innerHTML='<p class="blog-status">'+r.error.message+'</p>'; return; }
    if (!r.data.length){ list.innerHTML='<p class="blog-status">No posts yet.</p>'; return; }
    list.innerHTML=""; r.data.forEach(function(p){ list.appendChild(postRow(p)); });
  }

  function fillForm(p){
    $("editorTitle").textContent="Edit post";
    $("postId").value=p.id; $("f_title").value=p.title||""; $("f_slug").value=p.slug||"";
    $("f_excerpt").value=p.excerpt||""; $("f_cover").value=p.cover_image||"";
    $("f_tags").value=(p.tags||[]).join(", "); $("f_content").value=p.content||"";
    $("f_status").value=p.status||"draft";
  }
  function clearForm(){
    $("editorTitle").textContent="New post"; $("postId").value="";
    ["f_title","f_slug","f_excerpt","f_cover","f_tags","f_content"].forEach(function(i){$(i).value="";});
    $("f_status").value="draft"; $("editMsg").textContent="";
  }
  $("newBtn").addEventListener("click", clearForm);
  $("refreshBtn").addEventListener("click", loadPosts);
  $("f_title").addEventListener("blur", function(){ if(!$("f_slug").value) $("f_slug").value=slugify($("f_title").value); });

  $("saveBtn").addEventListener("click", async function(){
    var id=$("postId").value;
    var status=$("f_status").value;
    var rec={
      title:$("f_title").value.trim(),
      slug:($("f_slug").value.trim()||slugify($("f_title").value)),
      excerpt:$("f_excerpt").value.trim()||null,
      cover_image:$("f_cover").value.trim()||null,
      tags:$("f_tags").value.split(",").map(function(t){return t.trim();}).filter(Boolean),
      content:$("f_content").value,
      status:status
    };
    if(!rec.title || !rec.slug){ msg($("editMsg"),"Title and slug are required.",false); return; }
    if(status==="published") rec.published_at=new Date().toISOString();
    var r;
    if(id){ r=await sb.from("blog_posts").update(rec).eq("id",id); }
    else { r=await sb.from("blog_posts").insert(rec); }
    if(r.error){ msg($("editMsg"), r.error.message, false); return; }
    msg($("editMsg"), id?"Post updated.":"Post created.", true);
    clearForm(); loadPosts();
  });

  async function togglePublish(p){
    var next=p.status==="published"?"draft":"published";
    var patch={status:next}; if(next==="published"&&!p.published_at) patch.published_at=new Date().toISOString();
    var r=await sb.from("blog_posts").update(patch).eq("id",p.id);
    if(r.error) alert(r.error.message); else loadPosts();
  }
  async function delPost(id){
    var r=await sb.from("blog_posts").delete().eq("id",id);
    if(r.error) alert(r.error.message); else loadPosts();
  }

  boot();
})();
</script>
</body>
</html>
