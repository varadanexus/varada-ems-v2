<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" font-family="-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0c1d3a"/><stop offset=".6" stop-color="#0a1730"/><stop offset="1" stop-color="#07101f"/>
    </linearGradient>
    <linearGradient id="tower" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#16294a"/><stop offset="1" stop-color="#0d1a33"/>
    </linearGradient>
    <linearGradient id="towerLit" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1d3660"/><stop offset="1" stop-color="#101f3c"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e8d3ae"/><stop offset="1" stop-color="#b98d55"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2997ff"/><stop offset="1" stop-color="#7b5cff"/>
    </linearGradient>
    <radialGradient id="glow" cx=".5" cy=".2" r=".8">
      <stop offset="0" stop-color="#2997ff" stop-opacity=".25"/><stop offset="1" stop-color="#2997ff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#sky)"/>
  <rect width="1600" height="900" fill="url(#glow)"/>
  <g opacity=".5" stroke="#2c4470" stroke-width="1">
    <line x1="0" y1="760" x2="1600" y2="760"/>
  </g>
  <!-- skyline back -->
  <g opacity=".55">
    <rect x="60" y="470" width="120" height="290" fill="#0e1c37"/>
    <rect x="210" y="520" width="90" height="240" fill="#0e1c37"/>
    <rect x="1280" y="480" width="110" height="280" fill="#0e1c37"/>
    <rect x="1430" y="540" width="120" height="220" fill="#0e1c37"/>
  </g>
  <!-- crane -->
  <g fill="none">
    <g stroke="#41618f" stroke-width="6">
      <line x1="1180" y1="760" x2="1180" y2="330"/>
      <line x1="1050" y1="360" x2="1360" y2="360"/>
      <line x1="1180" y1="330" x2="1050" y2="360"/>
      <line x1="1180" y1="330" x2="1360" y2="360"/>
    </g>
    <line x1="1320" y1="360" x2="1320" y2="470" stroke="#41618f" stroke-width="3"/>
    <rect x="1300" y="470" width="40" height="30" fill="url(#gold)" stroke="none"/>
  </g>
  <!-- main hospital building -->
  <g>
    <rect x="560" y="300" width="360" height="460" rx="10" fill="url(#towerLit)" stroke="#2c4470" stroke-width="2"/>
    <g fill="#2997ff" opacity=".85">
      <g>
        <rect x="596" y="340" width="46" height="26" rx="4"/><rect x="676" y="340" width="46" height="26" rx="4" opacity=".45"/><rect x="756" y="340" width="46" height="26" rx="4"/><rect x="836" y="340" width="46" height="26" rx="4" opacity=".3"/>
        <rect x="596" y="396" width="46" height="26" rx="4" opacity=".4"/><rect x="676" y="396" width="46" height="26" rx="4"/><rect x="756" y="396" width="46" height="26" rx="4" opacity=".55"/><rect x="836" y="396" width="46" height="26" rx="4"/>
        <rect x="596" y="452" width="46" height="26" rx="4"/><rect x="676" y="452" width="46" height="26" rx="4" opacity=".35"/><rect x="756" y="452" width="46" height="26" rx="4"/><rect x="836" y="452" width="46" height="26" rx="4" opacity=".5"/>
        <rect x="596" y="508" width="46" height="26" rx="4" opacity=".5"/><rect x="676" y="508" width="46" height="26" rx="4"/><rect x="756" y="508" width="46" height="26" rx="4" opacity=".4"/><rect x="836" y="508" width="46" height="26" rx="4"/>
        <rect x="596" y="564" width="46" height="26" rx="4"/><rect x="676" y="564" width="46" height="26" rx="4" opacity=".6"/><rect x="756" y="564" width="46" height="26" rx="4" opacity=".35"/><rect x="836" y="564" width="46" height="26" rx="4"/>
      </g>
    </g>
    <!-- entrance -->
    <rect x="690" y="660" width="100" height="100" rx="8" fill="#0a1428" stroke="#2c4470"/>
    <rect x="700" y="672" width="80" height="88" rx="6" fill="#12233f"/>
    <!-- medical cross -->
    <circle cx="740" cy="260" r="42" fill="#0d1a33" stroke="url(#gold)" stroke-width="3"/>
    <path d="M740 238v44M718 260h44" stroke="url(#blue)" stroke-width="12" stroke-linecap="round"/>
  </g>
  <!-- side wings -->
  <rect x="380" y="440" width="180" height="320" rx="10" fill="url(#tower)" stroke="#2c4470" stroke-width="2"/>
  <rect x="920" y="440" width="180" height="320" rx="10" fill="url(#tower)" stroke="#2c4470" stroke-width="2"/>
  <g fill="#d9b98a" opacity=".7">
    <rect x="408" y="480" width="34" height="20" rx="3"/><rect x="468" y="480" width="34" height="20" rx="3" opacity=".4"/>
    <rect x="408" y="530" width="34" height="20" rx="3" opacity=".45"/><rect x="468" y="530" width="34" height="20" rx="3"/>
    <rect x="408" y="580" width="34" height="20" rx="3"/><rect x="468" y="580" width="34" height="20" rx="3" opacity=".5"/>
    <rect x="948" y="480" width="34" height="20" rx="3" opacity=".5"/><rect x="1008" y="480" width="34" height="20" rx="3"/>
    <rect x="948" y="530" width="34" height="20" rx="3"/><rect x="1008" y="530" width="34" height="20" rx="3" opacity=".4"/>
    <rect x="948" y="580" width="34" height="20" rx="3" opacity=".45"/><rect x="1008" y="580" width="34" height="20" rx="3"/>
  </g>
  <!-- ground reflection -->
  <rect x="0" y="760" width="1600" height="140" fill="#050c18"/>
  <g opacity=".22" transform="translate(0,1524) scale(1,-1)">
    <rect x="560" y="300" width="360" height="460" rx="10" fill="#16294a"/>
    <rect x="380" y="440" width="180" height="320" rx="10" fill="#101f3c"/>
    <rect x="920" y="440" width="180" height="320" rx="10" fill="#101f3c"/>
  </g>
  <!-- caption -->
  <g text-anchor="middle">
    <text x="800" y="835" fill="#adc0e7" font-size="26" letter-spacing="8" opacity=".85">VARADA NEXUS</text>
    <text x="800" y="868" fill="#7e90b5" font-size="14" letter-spacing="4">HEALTHCARE &#183; INFRASTRUCTURE &#183; SYSTEMS</text>
  </g>
</svg>
