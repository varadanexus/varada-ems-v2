<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" font-family="-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="csky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0c1d3a"/><stop offset=".65" stop-color="#0a1730"/><stop offset="1" stop-color="#07101f"/>
    </linearGradient>
    <linearGradient id="cgold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e8d3ae"/><stop offset="1" stop-color="#b98d55"/>
    </linearGradient>
    <linearGradient id="cblue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2997ff"/><stop offset="1" stop-color="#7b5cff"/>
    </linearGradient>
    <linearGradient id="cbar" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#2997ff" stop-opacity=".25"/><stop offset="1" stop-color="#2997ff"/>
    </linearGradient>
    <radialGradient id="cglow" cx=".7" cy=".15" r=".9">
      <stop offset="0" stop-color="#7b5cff" stop-opacity=".2"/><stop offset="1" stop-color="#7b5cff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#csky)"/>
  <rect width="1600" height="900" fill="url(#cglow)"/>
  <!-- storefront card -->
  <g>
    <rect x="150" y="200" width="560" height="480" rx="24" fill="#101c33" stroke="#2c4470" stroke-width="2"/>
    <!-- awning -->
    <path d="M150 280 h560 v20 h-560 z" fill="#0d1a33"/>
    <g>
      <path d="M150 300 q35 34 70 0 q35 34 70 0 q35 34 70 0 q35 34 70 0 q35 34 70 0 q35 34 70 0 q35 34 70 0 q35 34 70 0 v-20 h-560 z" fill="url(#cgold)" opacity=".9"/>
    </g>
    <rect x="190" y="240" width="200" height="18" rx="9" fill="#2c4470"/>
    <!-- door + windows -->
    <rect x="200" y="380" width="140" height="230" rx="10" fill="#0a1428" stroke="#2c4470"/>
    <rect x="380" y="380" width="290" height="130" rx="10" fill="#12233f" stroke="#2c4470"/>
    <g fill="#2997ff" opacity=".8">
      <rect x="404" y="404" width="60" height="82" rx="6"/>
      <rect x="486" y="404" width="60" height="82" rx="6" opacity=".5"/>
      <rect x="568" y="404" width="60" height="82" rx="6"/>
    </g>
    <rect x="380" y="540" width="290" height="70" rx="10" fill="#0d1a33" stroke="#2c4470"/>
    <text x="525" y="585" text-anchor="middle" fill="#d9b98a" font-size="22" letter-spacing="6">OPEN 24/7</text>
  </g>
  <!-- analytics panel -->
  <g>
    <rect x="800" y="160" width="650" height="380" rx="24" fill="#101c33" stroke="#2c4470" stroke-width="2"/>
    <text x="840" y="216" fill="#adc0e7" font-size="20" letter-spacing="3">REVENUE GROWTH</text>
    <g>
      <rect x="850" y="420" width="56" height="80" rx="6" fill="url(#cbar)"/>
      <rect x="936" y="380" width="56" height="120" rx="6" fill="url(#cbar)"/>
      <rect x="1022" y="400" width="56" height="100" rx="6" fill="url(#cbar)"/>
      <rect x="1108" y="330" width="56" height="170" rx="6" fill="url(#cbar)"/>
      <rect x="1194" y="290" width="56" height="210" rx="6" fill="url(#cbar)"/>
      <rect x="1280" y="250" width="56" height="250" rx="6" fill="url(#cgold)"/>
    </g>
    <path d="M878 400 L964 356 L1050 372 L1136 300 L1222 262 L1308 222" fill="none" stroke="#d9b98a" stroke-width="3.5" stroke-linecap="round"/>
    <circle cx="1308" cy="222" r="8" fill="#d9b98a"/>
    <line x1="840" y1="500" x2="1410" y2="500" stroke="#2c4470" stroke-width="2"/>
  </g>
  <!-- cart -->
  <g stroke="url(#cblue)" stroke-width="9" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M880 610 h44 l30 96 h150 l26 -70"/>
    <circle cx="972" cy="742" r="14" fill="#2997ff" stroke="none"/>
    <circle cx="1082" cy="742" r="14" fill="#2997ff" stroke="none"/>
  </g>
  <!-- packages -->
  <g stroke="#2c4470" stroke-width="2">
    <rect x="1220" y="620" width="110" height="90" rx="8" fill="#16294a"/>
    <rect x="1250" y="580" width="90" height="70" rx="8" fill="#1d3660"/>
    <line x1="1275" y1="620" x2="1275" y2="710" stroke="#d9b98a" stroke-width="4"/>
    <line x1="1295" y1="580" x2="1295" y2="650" stroke="#d9b98a" stroke-width="4"/>
  </g>
  <rect x="0" y="770" width="1600" height="130" fill="#050c18"/>
  <line x1="0" y1="770" x2="1600" y2="770" stroke="#2c4470"/>
  <g text-anchor="middle">
    <text x="800" y="835" fill="#adc0e7" font-size="26" letter-spacing="8" opacity=".85">DIGITAL COMMERCE</text>
    <text x="800" y="870" fill="#7e90b5" font-size="14" letter-spacing="4">E-COMMERCE &#183; MARKETING &#183; GROWTH</text>
  </g>
</svg>
